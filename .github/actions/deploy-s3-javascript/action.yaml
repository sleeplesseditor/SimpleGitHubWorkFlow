name: 'Deploy to AWS S3'
description: 'Deploys a static website to AWS S3 using JavaScript'
inputs:
  bucket:
    description: 'S3 bucket name'
    required: true
  region:
    description: 'AWS S3 bucket region'
    required: false
    default: 'us-east-1'
  dist-folder:
    description: 'Path to the distribution folder'
    required: true
runs:
  using: 'node24'
  main: main.js